name: CropRegenerator
version: '${project.version}'
main: com.tuservidor.cropregenerator.CropRegeneratorPlugin
api-version: '1.21.11'
description: Bloque regenerador de cultivos con soporte SuperiorSkyblock2 y FAWE
authors: [ TuNombre ]

softdepend:
  - SuperiorSkyblock2
  - FastAsyncWorldEdit
  - PlaceholderAPI

commands:
  cropblock:
    description: Comandos del plugin CropRegenerator
    usage: /cropblock <help|give|upgrade|info>
    aliases: [ cb ]

permissions:
  cropregenerator.give:
    description: Permite dar bloques regeneradores a jugadores
    default: op
  cropregenerator.upgrade:
    description: Permite mejorar el bloque regenerador
    default: true
  cropregenerator.admin:
    description: Acceso a todos los comandos administrativos
    default: op
